name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  black:
    name: Black Code Formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install black
        run: |
          python -m pip install --upgrade pip
          pip install "black>=26,<27"

      - name: Check formatting with black
        run: |
          black --check src/lore/ tests/

  ruff:
    name: Ruff Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        run: |
          ruff check src/lore/ tests/
